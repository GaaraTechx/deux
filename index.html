olor:#fff;font-family:'Fira Code',monospace;font-size:14px;resize:vertical;outline:none;}.action-bar{display:flex;justify-content:center;margin:30px 0;}.btn{padding:15px 40px;border-radius:12px;font-weight:800;cursor:pointer;border:none;display:flex;align-items:center;gap:10px;font-size:0.9rem;text-transform:uppercase;}.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;box-shadow:var(--neon-glow);}.btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 25px rgba(0,242,254,0.6);}.btn-copy{background:rgba(255,255,255,0.05);color:white;border:1px solid var(--border);padding:8px 15px;font-size:0.7rem;}.btn-run{background:rgba(244,63,94,0.1);color:var(--error);border:1px solid var(--error);padding:8px 15px;font-size:0.7rem;}.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}.settings-card{background:rgba(255,255,255,0.02);border-radius:18px;padding:20px;border:1px solid var(--border);}.settings-card h3{margin-top:0;font-size:1rem;color:#fff;margin-bottom:15px;display:flex;align-items:center;gap:8px;}.settings-card h3::before{content:"";width:3px;height:14px;background:var(--primary);border-radius:2px;}.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}.option-item{display:flex;align-items:center;font-size:0.85rem;cursor:pointer;color:var(--text-dim);}.option-item:hover{color:white;}input[type="checkbox"]{appearance:none;width:16px;height:16px;border:1px solid var(--border);border-radius:4px;margin-right:10px;cursor:pointer;position:relative;}input[type="checkbox"]:checked{background:var(--primary);}input[type="checkbox"]:checked::after{content:"✓";color:#000;font-size:10px;position:absolute;left:3px;top:1px;font-weight:800;}.input-field{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);padding:10px;border-radius:8px;color:white;margin-top:5px;font-size:0.8rem;}footer{padding:40px;text-align:center;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-dim);}footer a{color:var(--primary);text-decoration:none;}</style></head><body><canvas id="canvas-bg"></canvas><header><h1 class="hero-title">QUANTUM OBFUSCATOR</h1></header><main class="container"><div class="glass-panel"><div class="label-group"><span>Source Code</span><span id="input-stats">0 chars</span></div><textarea id="input-code" spellcheck="false">alert('XSS')</textarea></div><div class="action-bar"><button id="obfuscate-button" class="btn btn-primary">Vaporize Code</button></div><div class="glass-panel"><div class="label-group"><span>Result</span><div style="display:flex;gap:8px;"><button id="btn-copy" class="btn-copy btn"><span id="copy-text">COPY</span></button><button id="run-button" class="btn-run btn">RUN</button></div></div><textarea id="output-code" readonly></textarea><div class="label-group" style="margin-top:10px;margin-bottom:0;"><span>Density</span><span id="output-stats">0 chars</span></div></div><div class="glass-panel"><div class="label-group" style="margin-bottom:20px;">Quantum Engine Settings</div><div class="config-grid"><div class="settings-card"><h3>Variables & Logic</h3><label class="option-item"><input type="checkbox" id="option-use-variable" checked>Use Custom Variables</label><div style="margin-top:10px"><small style="color:var(--text-dim)">Charset Candidates</small><input type="text" id="option-variable-candidates" class="input-field" value="가나다あいう"></div><div style="margin-top:10px"><small style="color:var(--text-dim)">Iteration Count</small><input type="number" id="option-iteration-count" class="input-field" value="50"></div><label class="option-item" style="margin-top:15px;"><input type="checkbox" id="option-nodejs">NodeJS Compatibility</label></div><div class="settings-card"><h3>Exclude Basic</h3><div class="option-grid"><label class="option-item"><input type="checkbox" id="blacklist-upper-case" checked>Upper Case</label><label class="option-item"><input type="checkbox" id="blacklist-lower-case" checked>Lower Case         const canvas=document.getElementById('canvas-bg');const ctx=canvas.getContext('2d');let particles=[];const initCanvas=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};class Particle{constructor(){this.reset();}reset(){this.x=Math.random() * canvas.width;this.y=Math.random() * canvas.height;this.size=Math.random() * 2;this.speedX=(Math.random() - 0.5) * 0.4;this.speedY=(Math.random() - 0.5) * 0.4;this.alpha=Math.random() * 0.5;}update(){this.x +=this.speedX;this.y +=this.speedY;if(this.x<0 || this.x>canvas.width || this.y<0 || this.y>canvas.height) this.reset();}draw(){ctx.fillStyle=`rgba(0,242,254,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();}}for(let i=0;i<80;i++) particles.push(new Particle());const animate=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);};window.addEventListener('resize',initCanvas);initCanvas();animate();// UI Helpers
        const input=document.getElementById('input-code');const output=document.getElementById('output-code');const btnCopy=document.getElementById('btn-copy');input.addEventListener('input',()=>document.getElementById('input-stats').textContent=`${input.value.length}chars`);btnCopy.addEventListener('click',()=>{if(!output.value) return;navigator.clipboard.writeText(output.value).then(()=>{const text=document.getElementById('copy-text');text.textContent="COPIED!";setTimeout(()=>text.textContent="COPY",2000);});});document.getElementById('obfuscate-button').addEventListener('click',()=>{setTimeout(()=>{document.getElementById('output-stats').textContent=`${output.value.length}chars`;},200);});</script></body></html>
